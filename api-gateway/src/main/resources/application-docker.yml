spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            # Allow any origin so the app works on any server IP/hostname.
            # Patterns are required because "*" can't be combined with allowCredentials=true.
            allowedOriginPatterns:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

  data:
    redis:
      host: redis
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

# JWT Configuration for Docker
jwt:
  jwks-url: http://auth-service:8083/.well-known/jwks.json

# Service URLs (internal Docker network)
services:
  auth-service:
    url: http://auth-service:8083
  product-service:
    url: http://product-service:8082
  inventory-service:
    url: http://inventory-service:8086
  movement-service:
    url: http://movement-service:8084
  location-service:
    url: http://location-service:8085
  alert-service:
    url: http://alert-service:8088
  purchase-service:
    url: http://purchase-service:8089
  sales-service:
    url: http://sales-service:8090

server:
  port: 8080

logging:
  level:
    root: INFO
    com.stock.apigateway: DEBUG
    org.springframework.cloud.gateway: INFO
    reactor.netty: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always