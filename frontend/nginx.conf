server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large CSV imports/exports through the proxy
    client_max_body_size 50M;

    # Docker's embedded DNS — lets nginx re-resolve the gateway at runtime
    # (survives gateway container restarts / IP changes).
    resolver 127.0.0.11 valid=30s ipv6=off;

    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml image/svg+xml;

    # Long-lived cache for Vite's content-hashed assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Reverse-proxy the API to the gateway over the internal Docker network.
    # Because the browser calls THIS same origin, the app works on any server
    # IP/hostname with no rebuild and without any CORS configuration.
    location /api/ {
        set $gateway http://api-gateway:8080;
        proxy_pass $gateway$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # SPA fallback: serve index.html for any client-side route
    location / {
        try_files $uri $uri/ /index.html;
    }
}
